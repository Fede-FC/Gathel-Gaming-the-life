services:
  # SQL Server 2022
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gathel-sql-server
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "GathelPassword123!Secure"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      # Persistir datos en disco local
      - sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "echo > /dev/tcp/127.0.0.1/1433"]
      interval: 10s
      timeout: 3s
      retries: 40
      start_period: 60s
    networks:
      - gathel-network

  # Crea la base GathelDB antes de migrar (idempotente)
  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: gathel-db-init
    depends_on:
      sql-server:
        condition: service_healthy
    environment:
      SA_PASSWORD: "GathelPassword123!Secure"
    entrypoint: >
      /bin/bash -c "
      /opt/mssql-tools/bin/sqlcmd -S sql-server -U sa -P \"$$SA_PASSWORD\" -C
      -Q \"IF DB_ID('GathelDB') IS NULL CREATE DATABASE GathelDB;\"
      "
    networks:
      - gathel-network

  # Flyway para migraciones
  flyway:
    image: flyway/flyway:9.22.3-alpine
    container_name: gathel-flyway
    depends_on:
      sql-server:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      FLYWAY_URL: "jdbc:sqlserver://sql-server:1433;databaseName=GathelDB;encrypt=true;trustServerCertificate=true;authentication=SqlPassword;"
      FLYWAY_USER: "sa"
      FLYWAY_PASSWORD: "GathelPassword123!Secure"
      FLYWAY_LOCATIONS: "filesystem:/flyway/migrations"
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_OUT_OF_ORDER: "false"
      FLYWAY_VALIDATE_ON_MIGRATE: "true"
    volumes:
      # Montar scripts SQL en el contenedor
      - ./src/database/flyway/migrations:/flyway/migrations:ro
    networks:
      - gathel-network
    command: ["migrate"]

  # Backend — FastAPI REST API
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: gathel-backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: sql-server
      DB_PORT: "1433"
      DB_NAME: GathelDB
      DB_USER: sa
      DB_PASSWORD: "GathelPassword123!Secure"
      JWT_SECRET: "gathel-jwt-secret-change-in-production"
    depends_on:
      flyway:
        condition: service_completed_successfully
    networks:
      - gathel-network
    restart: unless-stopped

  # Frontend — React + nginx
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: gathel-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gathel-network
    restart: unless-stopped

  # Conexión manual desde tu máquina:
  # SQL Server  → localhost:1433  (sa / GathelPassword123!Secure / GathelDB)
  # Backend API → http://localhost:8000/docs
  # Frontend    → http://localhost:3000

volumes:
  sql-data:

networks:
  gathel-network:
    driver: bridge