# Flyway Configuration for Gathel Gaming Platform
# Parametrizado para funcionar en local (SQL Server) y Docker

# Conexión a base de datos (sobrescribir con variables de entorno)
flyway.url=${FLYWAY_URL:jdbc:sqlserver://localhost:1433;databaseName=GathelDB;encrypt=true;trustServerCertificate=true}
flyway.user=${FLYWAY_USER:sa}
flyway.password=${FLYWAY_PASSWORD}

# Esquema y ubicación de migraciones
flyway.schemas=dbo
flyway.locations=filesystem:./migrations

# Convención de nombres para migraciones SQL
flyway.sqlMigrationPrefix=V
flyway.sqlMigrationSeparator=__
flyway.sqlMigrationSuffixes=.sql

# Comportamiento
flyway.baselineOnMigrate=true
flyway.outOfOrder=false
flyway.validateOnMigrate=true

# Encoding
flyway.encoding=UTF-8
